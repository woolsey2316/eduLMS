version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: django_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=edu-lms
      - POSTGRES_USER=wools
      - POSTGRES_PASSWORD=wools
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: django_web_app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=edu-lms
      - DB_USER=wools
      - DB_PASSWORD=wools
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data: